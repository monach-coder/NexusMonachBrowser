name: Verify Windows build

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore NexusMonach.sln
      - name: Verify repository and license hygiene
        shell: pwsh
        run: ./scripts/Test-LicenseBoundary.ps1
      - name: Build
        run: dotnet build NexusMonach.sln --configuration Release --no-restore -warnaserror
      - name: Ensure runtime code has no external AI endpoints
        shell: pwsh
        run: |
          $hits = Get-ChildItem src/NexusMonach -Recurse -Include *.cs,*.js,*.mjs |
            Select-String -Pattern '11434|api\.openai\.com|api\.anthropic\.com|api\.github\.com/repos/ggml-org|huggingface\.co/.*/resolve'
          if ($hits) { $hits | Format-Table; throw 'External AI runtime endpoint found.' }
