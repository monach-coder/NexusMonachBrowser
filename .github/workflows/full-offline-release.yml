name: Build Full Offline Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag
        required: true
        default: v2.7.2

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 22.17.0

      - name: Verify repository and license hygiene
        shell: pwsh
        run: ./scripts/Test-LicenseBoundary.ps1

      - name: Download pinned offline AI payload
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $ai = 'src/NexusMonach/AI'
          New-Item -ItemType Directory -Force "$ai/llama","$ai/whisper","$ai/node","$ai/models/qwen3-0.6b","$ai/models/whisper","$ai/models/smolvlm-500m","$ai/models/multilingual-e5-small/onnx","$ai/models/translation/mul-en/onnx","$ai/models/translation/ko-en/onnx","$ai/models/translation/en-ru/onnx" | Out-Null
          function Get-Asset($Url, $Out) { curl.exe -L --fail --retry 5 --retry-delay 3 $Url -o $Out; if ($LASTEXITCODE) { throw "Download failed: $Url" } }

          Get-Asset 'https://github.com/ggml-org/llama.cpp/releases/download/b9966/llama-b9966-bin-win-cpu-x64.zip' "$env:TEMP/llama.zip"
          Get-Asset 'https://github.com/ggml-org/whisper.cpp/releases/download/v1.9.1/whisper-bin-x64.zip' "$env:TEMP/whisper.zip"
          Expand-Archive "$env:TEMP/llama.zip" "$ai/llama" -Force
          Expand-Archive "$env:TEMP/whisper.zip" "$ai/whisper" -Force
          Copy-Item (Get-Command node).Source "$ai/node/node.exe"

          Get-Asset 'https://huggingface.co/Qwen/Qwen3-0.6B-GGUF/resolve/main/Qwen3-0.6B-Q8_0.gguf?download=true' "$ai/models/qwen3-0.6b/Qwen3-0.6B-Q8_0.gguf"
          Get-Asset 'https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-base-q5_1.bin?download=true' "$ai/models/whisper/ggml-base-q5_1.bin"
          Get-Asset 'https://huggingface.co/ggml-org/SmolVLM-500M-Instruct-GGUF/resolve/main/SmolVLM-500M-Instruct-Q8_0.gguf?download=true' "$ai/models/smolvlm-500m/SmolVLM-500M-Instruct-Q8_0.gguf"
          Get-Asset 'https://huggingface.co/ggml-org/SmolVLM-500M-Instruct-GGUF/resolve/main/mmproj-SmolVLM-500M-Instruct-Q8_0.gguf?download=true' "$ai/models/smolvlm-500m/mmproj-SmolVLM-500M-Instruct-Q8_0.gguf"

          $e5 = 'https://huggingface.co/intfloat/multilingual-e5-small/resolve/main/'
          Get-Asset ($e5 + 'onnx/model_qint8_avx512_vnni.onnx?download=true') "$ai/models/multilingual-e5-small/onnx/model.onnx"
          foreach ($file in 'config.json','tokenizer.json','tokenizer_config.json','special_tokens_map.json','sentencepiece.bpe.model') {
            Get-Asset ($e5 + $file + '?download=true') "$ai/models/multilingual-e5-small/$file"
          }

          # Dedicated Apache-2.0 OPUS models. Page/selection translation uses
          # multilingual -> English -> Russian, with a dedicated Korean route;
          # Whisper transcripts use only the English -> Russian stage.
          # Revisions and large-file hashes are pinned.
          $opusFiles = 'config.json','generation_config.json','source.spm','special_tokens_map.json','target.spm','tokenizer.json','tokenizer_config.json','vocab.json'
          $mulEnRevision = '72a05e47cee89c718a9db4dc70d02fef3bc39de8'
          $koEnRevision = 'd9fa1ac6008242100fecb4fff9b0a5917a1be81f'
          $enRuRevision = 'e050376e960175e8ddc5cff85025dc8436cddd68'
          foreach ($file in $opusFiles) {
            Get-Asset "https://huggingface.co/Xenova/opus-mt-mul-en/resolve/$mulEnRevision/$file?download=true" "$ai/models/translation/mul-en/$file"
            Get-Asset "https://huggingface.co/Xenova/opus-mt-ko-en/resolve/$koEnRevision/$file?download=true" "$ai/models/translation/ko-en/$file"
            Get-Asset "https://huggingface.co/Xenova/opus-mt-en-ru/resolve/$enRuRevision/$file?download=true" "$ai/models/translation/en-ru/$file"
          }
          foreach ($file in 'encoder_model_quantized.onnx','decoder_model_merged_quantized.onnx') {
            Get-Asset "https://huggingface.co/Xenova/opus-mt-mul-en/resolve/$mulEnRevision/onnx/$file?download=true" "$ai/models/translation/mul-en/onnx/$file"
            Get-Asset "https://huggingface.co/Xenova/opus-mt-ko-en/resolve/$koEnRevision/onnx/$file?download=true" "$ai/models/translation/ko-en/onnx/$file"
            Get-Asset "https://huggingface.co/Xenova/opus-mt-en-ru/resolve/$enRuRevision/onnx/$file?download=true" "$ai/models/translation/en-ru/onnx/$file"
          }

          $expected = @{
            "$ai/models/qwen3-0.6b/Qwen3-0.6B-Q8_0.gguf"='9465e63a22add5354d9bb4b99e90117043c7124007664907259bd16d043bb031'
            "$ai/models/whisper/ggml-base-q5_1.bin"='422f1ae452ade6f30a004d7e5c6a43195e4433bc370bf23fac9cc591f01a8898'
            "$ai/models/smolvlm-500m/SmolVLM-500M-Instruct-Q8_0.gguf"='9d4612de6a42214499e301494a3ecc2be0abdd9de44e663bda63f1152fad1bf4'
            "$ai/models/smolvlm-500m/mmproj-SmolVLM-500M-Instruct-Q8_0.gguf"='d1eb8b6b23979205fdf63703ed10f788131a3f812c7b1f72e0119d5d81295150'
            "$ai/models/multilingual-e5-small/onnx/model.onnx"='dd476dd0c2514e9b9be83aeb3853fac0763e0bdf4a71645407587d77c48a2d88'
            "$ai/models/translation/mul-en/onnx/encoder_model_quantized.onnx"='5ce609a524375dbdd9c66b62b82b41abc667799022667ce424f20c245bd56925'
            "$ai/models/translation/mul-en/onnx/decoder_model_merged_quantized.onnx"='6add167a0cd3f78aa298b8f927d2e8645e33cb17df11e92967f0c5b5703c8c4d'
            "$ai/models/translation/ko-en/onnx/encoder_model_quantized.onnx"='210e1d2cb5b457cdeeffe288099cc9d1df9f13c35dc3d39fde4ba252af877380'
            "$ai/models/translation/ko-en/onnx/decoder_model_merged_quantized.onnx"='e131732653a6d3cec42a8b65f8844980042b036bdaca931446bc4b3530bc3506'
            "$ai/models/translation/en-ru/onnx/encoder_model_quantized.onnx"='97f28d8295d231b7da721ded06fa8c034787df2122cd8f85b904abdc4d15bd53'
            "$ai/models/translation/en-ru/onnx/decoder_model_merged_quantized.onnx"='7efefcd793a5663bc204224a92a123524f3dfe2ffad59e5f73d6734d1b11ad04'
          }
          foreach ($path in $expected.Keys) {
            $actual = (Get-FileHash $path -Algorithm SHA256).Hash.ToLowerInvariant()
            if ($actual -ne $expected[$path]) { throw "SHA-256 mismatch: $path" }
          }

          Push-Location $ai
          npm install --no-audit --no-fund
          Pop-Location

          # End-to-end translation smoke test. Presence and hashes alone are not
          # enough: load every translation route and require Russian output.
          $smoke = @{
            id = 'release-smoke'
            items = @(
              @{ id='en'; text='This browser translates text locally.'; source='en' },
              @{ id='de'; text='Diese Seite enthГ¤lt wichtige Informationen.'; source='auto' },
              @{ id='ja'; text='гЃ“гЃ®гѓљгѓјг‚ёгЃ«гЃЇй‡Ќи¦ЃгЃЄжѓ…е ±гЃЊеђ«гЃѕг‚ЊгЃ¦гЃ„гЃѕгЃ™гЂ‚'; source='auto' },
              @{ id='ko'; text='мќґ нЋмќґм§Ђм—ђлЉ” м¤‘мљ”н•њ м •ліґк°Ђ нЏ¬н•Ёлђм–ґ мћ€мЉµл‹€л‹¤.'; source='ko' }
            )
          } | ConvertTo-Json -Compress -Depth 5
          $translationOutput = $smoke | & "$ai/node/node.exe" "$ai/adapters/translate.mjs" `
            "$ai/models/translation/mul-en" "$ai/models/translation/en-ru" `
            "$ai/models/translation/ko-en"
          if ($LASTEXITCODE -ne 0) { throw "Translation smoke test process failed: $LASTEXITCODE" }
          $replyLine = $translationOutput | Where-Object { $_ -like '{"id":"release-smoke"*' } | Select-Object -Last 1
          if (-not $replyLine) { throw 'Translation smoke test returned no structured response.' }
          $reply = $replyLine | ConvertFrom-Json
          if ($reply.error -or $reply.items.Count -ne 4) { throw "Translation smoke test failed: $($reply.error)" }
          foreach ($item in $reply.items) {
            if (-not ($item.text -match '[Рђ-РЇР°-СЏРЃС‘]')) {
              throw "Translation smoke test did not produce Russian for $($item.id): $($item.text)"
            }
          }

      - name: Create verified AI pack
        shell: pwsh
        run: |
          $ai = 'src/NexusMonach/AI'
          Get-ChildItem $ai -File -Recurse | ForEach-Object {
            $relative = $_.FullName.Substring((Resolve-Path $ai).Path.Length + 1).Replace('\','/')
            "{0}  {1}" -f (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant(), $relative
          } | Set-Content "$ai/checksums.sha256" -Encoding ascii
          Compress-Archive -Path $ai -DestinationPath NexusMonach-AI-Pack-win-x64.zip -CompressionLevel Optimal

      - name: Build and verify browser
        shell: pwsh
        run: |
          dotnet build NexusMonach.sln --configuration Release -warnaserror
          ./scripts/Build-Portable.ps1

      - name: Sign official Windows binaries when certificate is configured
        shell: pwsh
        env:
          SIGNING_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_BASE64 }}
          SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERTIFICATE_PASSWORD }}
          SIGNING_TIMESTAMP_URL: ${{ vars.WINDOWS_SIGNING_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNING_CERTIFICATE_BASE64)) {
            Write-Warning 'Authenticode certificate is not configured; release remains unsigned.'
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'nexus-signing.pfx'
          try {
            [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_CERTIFICATE_BASE64))
            ./scripts/Sign-Release.ps1 -Directory dist/NexusMonach-Portable -CertificatePath $pfx `
              -CertificatePassword $env:SIGNING_CERTIFICATE_PASSWORD -TimestampUrl $env:SIGNING_TIMESTAMP_URL
            Remove-Item dist/NexusMonach-Portable-win-x64.zip -Force
            Compress-Archive -Path dist/NexusMonach-Portable/* -DestinationPath dist/NexusMonach-Portable-win-x64.zip -CompressionLevel Optimal
          } finally {
            Remove-Item $pfx -Force -ErrorAction SilentlyContinue
          }

      - name: Publish GitHub release with models
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          $notes = @'
          Nexus Monach 2.7.2 Full Offline

          Includes pinned local Qwen3 0.6B, Whisper base q5_1, SmolVLM 500M,
          multilingual-e5-small and dedicated OPUS multilingual/Korean/Russian translation models.
          Model hashes are verified before every build. No model is downloaded while the browser is running.
          The open Nexus Intelligence Fabric is built from the same repository and includes deep page analysis,
          controlled same-origin research and an agent summary with sources, conflicts and missing information.
          See CHANGELOG.md for privacy, compatibility and build details.
          '@
          cmd.exe /d /c "gh release view %TAG% >nul 2>nul"
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG NexusMonach-AI-Pack-win-x64.zip dist/NexusMonach-Portable-win-x64.zip --clobber
          } else {
            gh release create $env:TAG NexusMonach-AI-Pack-win-x64.zip dist/NexusMonach-Portable-win-x64.zip --title "Nexus Monach 2.7.2 Full Offline" --notes $notes
          }
