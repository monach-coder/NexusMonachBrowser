name: Windows portable build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x
      - name: Verify repository and license hygiene
        shell: pwsh
        run: ./scripts/Test-LicenseBoundary.ps1
      - name: Build and package
        shell: powershell
        run: ./scripts/Build-Portable.ps1
      - name: Upload portable archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NexusMonach-Portable-win-x64
          path: dist/NexusMonach-Portable-win-x64.zip
          if-no-files-found: error
