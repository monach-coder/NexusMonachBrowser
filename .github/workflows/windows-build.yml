name: Windows portable build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x
      - name: Verify repository and license hygiene
        shell: pwsh
        run: ./scripts/Test-LicenseBoundary.ps1
      - name: Build and package
        shell: powershell
        run: ./scripts/Build-Portable.ps1
      - name: Upload portable archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NexusMonach-Portable-win-x64
          path: dist/NexusMonach-Portable-win-x64.zip
          if-no-files-found: error
