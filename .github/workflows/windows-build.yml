name: Windows portable build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: 8.0.x
      - name: Verify repository and license hygiene
        shell: pwsh
        run: ./scripts/Test-LicenseBoundary.ps1
      - name: Verify local AI security boundary
        shell: pwsh
        run: ./scripts/Test-LocalAiBoundary.ps1
      - name: Build and package
        shell: powershell
        run: ./scripts/Build-Portable.ps1
      - name: Upload portable archive
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: NexusMonach-Portable-win-x64
          path: dist/NexusMonach-Portable-win-x64.zip
          if-no-files-found: error
