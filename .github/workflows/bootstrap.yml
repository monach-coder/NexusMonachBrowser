name: Import Nexus Monach source

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract and commit source tree
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $archive = 'NexusMonachBrowser-2.6.1-source.zip'
          if (-not (Test-Path $archive)) { throw "Upload $archive to the repository root first." }
          $temporary = Join-Path $env:RUNNER_TEMP 'nexus-source'
          Expand-Archive $archive $temporary -Force
          Get-ChildItem $temporary -Force | Copy-Item -Destination . -Recurse -Force
          Remove-Item $archive -Force
          Remove-Item '.github/workflows' -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item 'BOOTSTRAP_WORKFLOW.yml' -Force -ErrorAction SilentlyContinue
          Get-ChildItem 'src/NexusMonach' -Filter '*_wpftmp.csproj' -File -ErrorAction SilentlyContinue | Remove-Item -Force
          git config user.name 'Nexus Monach Builder'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'Publish Nexus Monach 2.6.1 source and offline AI release workflow'
          git push
