<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <header>
    <img src="icon.svg" alt=""><div><h1>Nexus AI</h1><small id="model">Проверка встроенного AI…</small></div>
    <label class="auto"><input id="auto" type="checkbox" checked> объяснять выбранный элемент</label>
  </header>
  <section class="toolbar">
    <button id="element">Анализ $0</button>
    <button id="network">Анализ Network</button>
    <button id="highlight" disabled>Подсветить найденное</button>
  </section>
  <section class="question">
    <input id="query" placeholder="Например: где теряется время загрузки?">
    <button id="ask">Спросить</button>
  </section>
  <div id="status">Выбери элемент во вкладке Elements или задай вопрос.</div>
  <main id="result"></main>
  <footer>Nexus читает только очищенный DOM/HAR, не получает cookies, тела запросов и значения полей. Ничего не нажимает.</footer>
  <script src="panel.js"></script>
</body>
</html>
